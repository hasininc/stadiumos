[loggers]
keys=root,fastapi,ai_orchestrator

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_fastapi]
level=INFO
handlers=consoleHandler
qualname=fastapi
propagate=0

[logger_ai_orchestrator]
level=DEBUG
handlers=consoleHandler
qualname=ai_orchestrator
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
