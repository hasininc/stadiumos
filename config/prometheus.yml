global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'express-service'
    scrape_interval: 5s
    static_configs:
      - targets: ['express-service:8000']
    metrics_path: '/metrics'

  - job_name: 'fastapi-service'
    scrape_interval: 5s
    static_configs:
      - targets: ['fastapi-service:8080']
    metrics_path: '/metrics'

  - job_name: 'ml-service'
    static_configs:
      - targets: ['ml-service:8081']
    metrics_path: '/metrics'
