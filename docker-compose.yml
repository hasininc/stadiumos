services:
  # Relational Database Core
  postgres:
    image: postgres:15-alpine
    container_name: stadiumos-postgres
    environment:
      POSTGRES_DB: stadiumos_db
      POSTGRES_USER: stadiumos_app_user
      POSTGRES_PASSWORD: local_dev_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stadiumos_app_user -d stadiumos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ephemeral Cache Store
  redis:
    image: redis:7-alpine
    container_name: stadiumos-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Coordination Node
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: stadiumos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # Kafka Distributed Event Broker
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: stadiumos-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Core Backend Service
  fastapi-service:
    build:
      context: .
      dockerfile: backend/fastapi-service/Dockerfile
    container_name: stadiumos-fastapi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8080"
    environment:
      - ENVIRONMENT=development
      - STADIUMOS_PG_HOST=postgres
      - STADIUMOS_PG_PORT=5432
      - STADIUMOS_PG_DB=stadiumos_db
      - STADIUMOS_PG_USER=stadiumos_app_user
      - STADIUMOS_PG_PASS=local_dev_password_change_me
      - STADIUMOS_REDIS_HOST=redis
      - STADIUMOS_REDIS_PORT=6379
      - STADIUMOS_KAFKA_BROKERS=kafka:29092
      - LLM_PROVIDER=google
    env_file:
      - path: .env
        required: false

  # Frontend Dashboard
  ops-dashboard:
    build:
      context: .
      dockerfile: apps/ops-dashboard/Dockerfile
    container_name: stadiumos-dashboard
    depends_on:
      - fastapi-service
    ports:
      - "3000:80"

  # CV Edge Node
  cv-edge:
    build:
      context: .
      dockerfile: apps/cv-edge/Dockerfile
    container_name: stadiumos-cvedge
    depends_on:
      - fastapi-service
    environment:
      - EDGE_BACKEND_API_URL=http://fastapi-service:8080
      - EDGE_BACKEND_WS_URL=ws://fastapi-service:8080/ws/live

volumes:
  pgdata:
  redisdata:
