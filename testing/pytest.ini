[pytest]
minversion = 7.0
addopts = -ra -q --tb=short --cov=backend/fastapi-service/app --cov-report=html
testpaths =
    testing
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
log_cli_format = %%(asctime)s [%%(levelname)8s] %%(message)s (%%(filename)s:%%(lineno)s)
log_cli_date_format = %%Y-%%m-%%d %%H:%%M:%%S
asyncio_mode = auto
