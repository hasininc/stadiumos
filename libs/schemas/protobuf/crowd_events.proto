syntax = "proto3";

package stadiumos.schemas.protobuf;

option go_package = "github.com/stadiumos/stadiumos/libs/schemas/protobuf/crowd";

// Ingestion payload from Edge CV CCTV feeds
message CrowdDetectedEvent {
  string camera_id = 1;
  string zone_id = 2;
  double density_sqm = 3;
  int32 head_count = 4;
  int64 timestamp = 5;
}

// Ingestion payload from Turnstile tripwires
message QueueHighEvent {
  string gate_id = 1;
  int32 queue_length = 2;
  int32 est_wait_seconds = 3;
  int64 timestamp = 6;
}

// Security Anomaly Alert generated by Edge Video networks
message SuspiciousObjectEvent {
  string camera_id = 1;
  string object_class = 2;
  double bounding_box_x = 3;
  double bounding_box_y = 4;
  int32 dwell_time_seconds = 5;
  int64 timestamp = 7;
}

// Medical Emergency Alert generated by Video Fall Recognition
message FallDetectedEvent {
  string camera_id = 1;
  double coordinate_x = 2;
  double coordinate_y = 3;
  double severity_score = 4;
  int64 timestamp = 8;
}
