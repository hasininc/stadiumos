name: StadiumOS CI/CD Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Node dependencies
      run: npm ci

    - name: Run Linters & Audits
      run: npm run lint

    - name: Run TypeScript Verification
      run: npm run build

    - name: Run Backend PyTest Suite
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        # Run tests if test configurations exist
